name: Performance Benchmark

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download benchmark APK
        run: |
          mkdir -p benchmark-input
          # Use a small sample APK for benchmarking
          curl -L -o benchmark-input/sample.apk \
            "https://github.com/damarkuncoro/jadx-projects/raw/main/dexforge-cli/src/test/resources/samples/small.apk" \
            || echo "Using local sample if download fails"

      - name: Run benchmark
        run: |
          ./gradlew :dexforge-cli:installShadowDist -x test --no-daemon

          echo "=== DexForge Performance Benchmark ===" > benchmark-results.txt
          echo "Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> benchmark-results.txt
          echo "Commit: ${{ github.sha }}" >> benchmark-results.txt
          echo "" >> benchmark-results.txt

          echo "--- Decompilation Benchmark ---" >> benchmark-results.txt

          # Warmup run
          ./dexforge-cli/build/install/dexforge-cli/bin/dexforge benchmark-input/sample.apk -d /tmp/benchmark-warmup > /dev/null 2>&1 || true

          # Timed run
          START=$(date +%s%N)
          ./dexforge-cli/build/install/dexforge-cli/bin/dexforge benchmark-input/sample.apk -d /tmp/benchmark-output
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "Decompilation time: ${ELAPSED}ms" >> benchmark-results.txt

          # Count output files
          CLASS_COUNT=$(find /tmp/benchmark-output -name "*.java" | wc -l)
          echo "Classes decompiled: ${CLASS_COUNT}" >> benchmark-results.txt

          # Memory usage
          echo "" >> benchmark-results.txt
          echo "--- Memory Usage ---" >> benchmark-results.txt
          ps aux | grep dexforge | grep -v grep | awk '{print "RSS: " $6 " KB"}' >> benchmark-results.txt || true

          echo "" >> benchmark-results.txt
          echo "--- Disk Usage ---" >> benchmark-results.txt
          du -sh /tmp/benchmark-output >> benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 30

      - name: Compare with previous benchmark
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-latest
          path: benchmark-results.txt
          retention-days: 90
