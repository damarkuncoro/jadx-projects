name: VS Code Extension CI

on:
  push:
    branches: [ master, main ]
    paths:
      - 'dexforge-vscode/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'dexforge-vscode/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dexforge-vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dexforge-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Compile extension
        run: npm run compile

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "::warning::Uncommitted changes detected. Run 'npm run format' to fix."
          fi

  package-extension:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: dexforge-vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dexforge-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --out dexforge.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: dexforge-vscode-vsix
          path: dexforge-vscode/dexforge.vsix
          retention-days: 30

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: package-extension
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: dexforge-vscode-vsix
          path: dexforge-vscode/

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath dexforge-vscode/dexforge.vsix
        working-directory: dexforge-vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        continue-on-error: true
