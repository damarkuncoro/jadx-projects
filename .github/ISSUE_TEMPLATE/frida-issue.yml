name: Frida Integration Issue
description: Report issues with Frida integration, script generation, or device instrumentation
title: "[Frida] "
labels: ["frida", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Frida integration issue! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: DexForge Version
      description: What version of DexForge are you using?
      placeholder: "e.g., r1234.abc1234"
    validations:
      required: true

  - type: input
    id: frida-version
    attributes:
      label: Frida Version
      description: What version of Frida tools are you using?
      placeholder: "e.g., 16.1.11"
    validations:
      required: true

  - type: dropdown
    id: device-type
    attributes:
      label: Device Type
      description: What type of device are you using?
      options:
        - Rooted device
        - Non-rooted device (frida-gadget)
        - Emulator
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running DexForge on?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe the issue you're experiencing with Frida integration.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Load APK '...'
        2. Generate Frida script for '...'
        3. Run script on target '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Error Messages
      description: Please include relevant logs from the Frida panel output.
      render: shell

  - type: textarea
    id: script
    attributes:
      label: Frida Script
      description: If applicable, include the Frida script that caused the issue.
      render: javascript

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
