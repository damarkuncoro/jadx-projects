name: Bug Report
description: Report a bug or unexpected behavior in DexForge
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us investigate.

  - type: input
    id: version
    attributes:
      label: DexForge Version
      description: What version of DexForge are you using?
      placeholder: "e.g., r1234.abc1234 or 1.0.0-alpha"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - DexForge GUI
        - DexForge CLI
        - DexForge Device Explorer
        - DexForge Layout Viewer
        - DexForge Frida Integration
        - DexForge VS Code Extension
        - LSP Daemon
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running DexForge on?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java Version
      description: What Java version are you using?
      placeholder: "e.g., 21.0.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Load APK '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Error Messages
      description: Please include relevant logs, stack traces, or error messages.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
